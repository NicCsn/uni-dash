name: Build & Release

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.os }} (${{ matrix.target }})
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            bundle_dir: macos
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundle_dir: appimage
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Install DMG bundler (macOS)
        if: runner.os == 'macOS'
        run: npm install -g create-dmg

      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload macOS release assets
        if: startsWith(github.ref, 'refs/tags/') && runner.os == 'macOS'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig

      - name: Upload Linux release assets
        if: startsWith(github.ref, 'refs/tags/') && runner.os == 'Linux'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz
            src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz.sig

      - name: Update Homebrew Tap (macOS only)
        if: startsWith(github.ref, 'refs/tags/') && runner.os == 'macOS'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)
          SHA=$(shasum -a 256 "$DMG" | cut -d' ' -f1)

          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/NicCsn/homebrew-uni-dash.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap
          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/uni-dash.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA}\"/" Casks/uni-dash.rb
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Casks/uni-dash.rb
          git commit -m "Update to v${VERSION}" || true
          git push

  update-manifest:
    name: Generate unified latest.json
    permissions:
      contents: write
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate unified latest.json
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          VERSION="${GITHUB_REF_NAME#v}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          TAG="${{ github.ref_name }}"
          OWNER_REPO="${{ github.repository }}"

          # Download macOS signature
          gh release download "$TAG" --pattern "*.app.tar.gz.sig" --dir /tmp/sigs 2>/dev/null

          # Download Linux signature  
          gh release download "$TAG" --pattern "*.AppImage.tar.gz.sig" --dir /tmp/sigs 2>/dev/null

          MAC_SIG="$(cat /tmp/sigs/*.app.tar.gz.sig 2>/dev/null || echo '')"
          LINUX_SIG="$(cat /tmp/sigs/*.AppImage.tar.gz.sig 2>/dev/null || echo '')"

          # Build JSON
          echo '{' > latest.json
          echo '  "version": "'"$VERSION"'",' >> latest.json
          echo '  "notes": "https://github.com/'"$OWNER_REPO"'/releases/tag/'"$TAG"'",' >> latest.json
          echo '  "pub_date": "'"$PUB_DATE"'",' >> latest.json
          echo '  "platforms": {' >> latest.json

          FIRST=true
          if [ -n "$MAC_SIG" ]; then
            MAC_FILE=$(gh release download "$TAG" --pattern "*.app.tar.gz" --dir /tmp/sigs -p 2>/dev/null && ls /tmp/sigs/*.app.tar.gz 2>/dev/null | head -1 | xargs basename)
            [ "$FIRST" = false ] && echo '    ,' >> latest.json
            FIRST=false
            echo '    "darwin-aarch64": {' >> latest.json
            echo '      "signature": "'"$MAC_SIG"'",' >> latest.json
            echo '      "url": "https://github.com/'"$OWNER_REPO"'/releases/download/'"$TAG"'/'"$MAC_FILE"'"' >> latest.json
            echo '    }' >> latest.json
          fi

          if [ -n "$LINUX_SIG" ]; then
            LINUX_FILE=$(ls /tmp/sigs/*.AppImage.tar.gz 2>/dev/null | head -1 | xargs basename)
            [ "$FIRST" = false ] && echo '    ,' >> latest.json
            FIRST=false
            echo '    "linux-x86_64": {' >> latest.json
            echo '      "signature": "'"$LINUX_SIG"'",' >> latest.json
            echo '      "url": "https://github.com/'"$OWNER_REPO"'/releases/download/'"$TAG"'/'"$LINUX_FILE"'"' >> latest.json
            echo '    }' >> latest.json
          fi

          echo '  }' >> latest.json
          echo '}' >> latest.json

          cat latest.json

      - name: Upload latest.json to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" latest.json --clobber
