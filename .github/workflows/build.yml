name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        os: [macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install DMG bundler
        run: npm install -g create-dmg

      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Generate update manifest
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          SIGNATURE="$(cat src-tauri/target/release/bundle/macos/*.tar.gz.sig)"
          cat > src-tauri/target/release/bundle/macos/latest.json <<EOF
          {
            "version": "$VERSION",
            "notes": "https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}",
            "pub_date": "$PUB_DATE",
            "platforms": {
              "darwin-aarch64": {
                "signature": "$SIGNATURE",
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Uni.Dash.app.tar.gz"
              }
            }
          }
          EOF

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
            src-tauri/target/release/bundle/macos/latest.json

      - name: Update Homebrew Tap
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)
          SHA=$(shasum -a 256 "$DMG" | cut -d' ' -f1)

          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/NicCsn/homebrew-uni-dash.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap
          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/uni-dash.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA}\"/" Casks/uni-dash.rb
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Casks/uni-dash.rb
          git commit -m "Update to v${VERSION}" || true
          git push
